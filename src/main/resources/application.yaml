# 项目基础配置
project:
  name: Skills API
  version: 1.0.0
  description: 技能 API 服务，提供热搜采集、散文随机句子、违禁词检测、IP 地理位置查询、今日黄历等功能接口。
  contact:
    name: Devil
    email: 321704933@qq.com
    url: https://github.com/devil-mao/skills-api
  license:
    name: Apache License 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

spring:
  application:
    name: skills-api
  config:
    import: optional:file:./config/application-local.yaml
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 15
      timeout: 5s

skills-api:
  web:
    trace-header-name: X-Trace-Id
    wrap-success-response: true
  idempotency:
    enabled: true
    header-name: X-Idempotency-Key
    ttl: PT10M
  rate-limit:
    enabled: true
    client-identifier-header: X-Forwarded-For
    default-window: PT1M
    default-permits: 60
  scheduler:
    enabled: true
    thread-pool-size: 4
    platforms:
      baidu:
        enabled: true
        cron: "0 0/30 * * * ?"
      weibo:
        enabled: true
        cron: "0 0/30 * * * ?"
      douyin:
        enabled: true
        cron: "0 0/30 * * * ?"
      toutiao:
        enabled: true
        cron: "0 0/30 * * * ?"
  image:
    max-file-size: 10485760
    max-output-size: 52428800
    default-quality: 85

nextdoc4j:
  enabled: true
  extension:
    enabled: true
    brand:
      title: "SKILLS API 文档"
      footer-text: "Copyright © 2026 SKILLS API"
