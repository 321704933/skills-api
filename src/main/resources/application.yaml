spring:
  application:
    name: skills-api
  config:
    import: optional:file:./config/application-local.yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SKILLS_API_DB_URL:jdbc:mysql://127.0.0.1:3306/skills_api?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SKILLS_API_DB_USERNAME:}
    password: ${SKILLS_API_DB_PASSWORD:}
    hikari:
      initialization-fail-timeout: -1
  jackson:
    default-property-inclusion: non_null
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 15
      timeout: 5s

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: ai.skills.api
  global-config:
    banner: false
    db-config:
      id-type: assign_id
  configuration:
    map-underscore-to-camel-case: true

skills-api:
  web:
    trace-header-name: X-Trace-Id
    wrap-success-response: true
  idempotency:
    enabled: true
    header-name: X-Idempotency-Key
    ttl: PT10M
  rate-limit:
    enabled: true
    client-identifier-header: X-Forwarded-For
    default-window: PT1M
    default-permits: 60
  scheduler:
    enabled: true
    thread-pool-size: 4
    platforms:
      baidu:
        enabled: true
        cron: "0 0/30 * * * ?"
      weibo:
        enabled: true
        cron: "0 0/30 * * * ?"
      douyin:
        enabled: true
        cron: "0 0/30 * * * ?"
      toutiao:
        enabled: true
        cron: "0 0/30 * * * ?"

nextdoc4j:
  enabled: true
  extension:
    enabled: true
    brand:
      logo: classpath:brand/logo/logo.png
      title: "Skills API 文档"
      footer-text: "Copyright © 2026 skill-api"
